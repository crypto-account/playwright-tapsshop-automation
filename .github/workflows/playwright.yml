name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly regression at 02:00 UTC daily
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      grep:
        description: 'Grep pattern (e.g. @smoke, @regression). Leave empty to run all.'
        required: false
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: playwright-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  # PR: smoke only, chromium — fast blocking check (<3 min)
  smoke:
    if: github.event_name == 'pull_request'
    name: Smoke (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: pw-version
        run: |
          version=$(node -p "require('@playwright/test/package.json').version")
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install OS deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run smoke tests
        run: npx playwright test --project=chromium --grep "@smoke"

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: playwright-report/
          retention-days: 7

  # Push to main / nightly / manual: full matrix (chromium/firefox/webkit)
  full:
    if: github.event_name != 'pull_request'
    name: Full (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: pw-version
        run: |
          version=$(node -p "require('@playwright/test/package.json').version")
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install ${{ matrix.browser }}
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Install OS deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps ${{ matrix.browser }}

      - name: Run tests
        run: |
          if [ -n "${{ inputs.grep }}" ]; then
            npx playwright test --project=${{ matrix.browser }} --grep "${{ inputs.grep }}"
          else
            npx playwright test --project=${{ matrix.browser }}
          fi

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 14

  # Publish chromium report to GitHub Pages — only on main push and nightly
  publish-report:
    name: Publish report to GitHub Pages
    needs: full
    if: always() && needs.full.result != 'skipped' && (github.ref == 'refs/heads/main' || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download chromium report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report-chromium
          path: report

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Slack notification — always, adapts to trigger
  notify-slack:
    name: Notify Slack
    needs: [smoke, full, publish-report]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Compute status and trigger
        id: status
        run: |
          smoke="${{ needs.smoke.result }}"
          full="${{ needs.full.result }}"

          # Success if either the executed job(s) succeeded (the other is likely skipped)
          if { [ "$smoke" = "success" ] || [ "$smoke" = "skipped" ]; } && { [ "$full" = "success" ] || [ "$full" = "skipped" ]; }; then
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "text=passed" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
          else
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "text=failed" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
          fi

          case "${{ github.event_name }}" in
            pull_request)      trigger="PR smoke — chromium only" ;;
            push)              trigger="Push to ${{ github.ref_name }} — full matrix" ;;
            schedule)          trigger="Nightly regression — full matrix" ;;
            workflow_dispatch) trigger="Manual dispatch" ;;
            *)                 trigger="${{ github.event_name }}" ;;
          esac
          echo "trigger=$trigger" >> $GITHUB_OUTPUT

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "attachments": [
                {
                  "color": "${{ steps.status.outputs.color }}",
                  "blocks": [
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "${{ steps.status.outputs.emoji }} *Playwright CI — tests ${{ steps.status.outputs.text }}*"
                      }
                    },
                    {
                      "type": "section",
                      "fields": [
                        { "type": "mrkdwn", "text": "*Trigger:*\n${{ steps.status.outputs.trigger }}" },
                        { "type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}" },
                        { "type": "mrkdwn", "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>" },
                        { "type": "mrkdwn", "text": "*Actor:*\n${{ github.actor }}" }
                      ]
                    },
                    {
                      "type": "actions",
                      "elements": [
                        {
                          "type": "button",
                          "text": { "type": "plain_text", "text": "View run" },
                          "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                        }
                      ]
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
